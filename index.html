

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌱 Farmer AI</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #eaf5ea;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.app {
    width: 90%;
    max-width: 700px;
    height: 90vh;
    background: white;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.header {
    background: #2e7d32;
    color: white;
    padding: 15px;
    font-size: 20px;
    text-align: center;
}

.modes {
    display: flex;
    gap: 8px;
    padding: 10px;
    flex-wrap: wrap;
    border-bottom: 1px solid #ddd;
}

.mode {
    padding: 6px 10px;
    border-radius: 20px;
    border: 1px solid #2e7d32;
    cursor: pointer;
    font-size: 13px;
    background: white;
}

.mode.active {
    background: #2e7d32;
    color: white;
}

.chat {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg {
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 75%;
    white-space: pre-wrap;
}

.user {
    background: #c8e6c9;
    align-self: flex-end;
}

.ai {
    background: #f1f1f1;
    align-self: flex-start;
}

.input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button.send {
    margin-left: 8px;
    padding: 10px 16px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="app">

    <div class="header">🌱 Farmer AI Assistant</div>

    <!-- MODES -->
    <div class="modes">
        <div class="mode active" onclick="setMode('general')">🌍 General</div>
        <div class="mode" onclick="setMode('crop')">🌾 Crop</div>
        <div class="mode" onclick="setMode('pest')">🐛 Pest</div>
        <div class="mode" onclick="setMode('soil')">🌱 Soil</div>
        <div class="mode" onclick="setMode('water')">💧 Water</div>
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <input id="input" placeholder="Ask your question..." />
        <button class="send" onclick="send()">Send</button>
    </div>

</div>

<script>

let mode = "general";

function setMode(m) {
    mode = m;

    document.querySelectorAll(".mode").forEach(el => {
        el.classList.remove("active");
    });

    event.target.classList.add("active");
}

function addMessage(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop =
        document.getElementById("chat").scrollHeight;

    return div;
}

async function send() {

    let input = document.getElementById("input");
    let text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    let typing = addMessage("AI is thinking...", "ai");

    try {

        let res = await fetch("http://127.0.0.1:8000/ask", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                text: text,
                mode: mode
            })
        });

        let data = await res.json();

        typing.remove();
        addMessage(data.answer, "ai");

    } catch (err) {
        typing.innerText = "Error connecting to server";
    }
}
</script>

</body>
</html>
