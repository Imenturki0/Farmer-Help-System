<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Farmer AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at top left, #25204f, transparent 40%),
                radial-gradient(circle at bottom right, #123b4a, transparent 40%),
                #080b12;
            color: white;
        }

        /* APP */
        .app {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background: rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: 0.3s ease;
            overflow: hidden;
        }

        .sidebar.collapsed {
            width: 35px;
        }

        .sidebar.collapsed .mode,
        .sidebar.collapsed .logo {
            display: none;
        }

        /* toggle */
        .toggle {
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            user-select: none;
            margin-bottom: 10px;
        }

        /* logo */
        .logo {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* modes */
        .mode {
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            color: #9aa3b2;
            transition: 0.2s;
        }

        .mode:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .mode.active {
            background: rgba(124, 92, 255, 0.2);
            color: white;
            border-left: 3px solid #7c5cff;
        }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* CHAT */
        .chat {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 14px;
            border-radius: 14px;
            max-width: 60%;
            font-size: 14px;
            animation: pop 0.15s ease;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        @keyframes pop {
            from {
                transform: scale(0.97);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .user {
            background: linear-gradient(135deg, #7c5cff, #9b7cff);
            box-shadow: 0 10px 30px rgba(124, 92, 255, .3);
            margin-left: auto;
        }

        .ai {
            background: rgba(255, 255, 255, .07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* INPUT */
        .input-area {
            display: flex;
            margin: 15px;

        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: transparent;
            color: white;
            outline: none;
        }

        button.send {
            margin-left: 10px;
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            background: #7c5cff;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button.send:hover {
            transform: translateY(-2px);
            background: #6a4df0;
        }

        .dots {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            height: 14px;
            line-height: 1;
        }

        .dots span {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.2s infinite;
        }

        .dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {

            0%,
            80%,
            100% {
                opacity: 0.2;
                transform: scale(0.8);
            }

            40% {
                opacity: 1;
                transform: scale(1.2);
            }
        }
    </style>

</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->
        <div class="sidebar collapsed" id="sidebar">

            <div class="toggle" onclick="toggleSidebar()">☰</div>

            <div class="logo">🌱 Farmer AI</div>

            <div class="mode active" data-mode="general">🌍 General</div>
            <div class="mode" data-mode="crop">🌾 Crop</div>
            <div class="mode" data-mode="pest">🐛 Pest</div>
            <div class="mode" data-mode="soil">🌱 Soil</div>
            <div class="mode" data-mode="water">💧 Water</div>
            <button class="mode" onclick="newChat()">➕ New Chat</button>

        </div>

        <!-- MAIN -->
        <div class="main">

            <div id="chat" class="chat"></div>

            <div class="input-area">
                <input id="input" placeholder="Ask anything..." />
                <button class="send" onclick="send()">Send</button>
            </div>

        </div>

    </div>

    <script>

        let mode = "general";
        let userLocation = null;

        let sessionId = localStorage.getItem("session_id")

        if (!sessionId) {
            sessionId = crypto.randomUUID();
            localStorage.setItem("session_id", sessionId)
        }
        console.log("Session:", sessionId)

        /* SIDEBAR TOGGLE (clean) */
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("collapsed");
        }

        /* MODE HANDLING (clean event system) */
        document.querySelectorAll(".mode").forEach(btn => {
            btn.addEventListener("click", () => {

                mode = btn.dataset.mode;

                document.querySelectorAll(".mode")
                    .forEach(m => m.classList.remove("active"));

                btn.classList.add("active");
            });
        });

        /* CHAT UI */
        function addMessage(text, type) {
            const div = document.createElement("div");
            div.className = `msg ${type}`;
            if (type == "ai") {
                div.innerHTML = "🤖 " + text;
            }
            else {
                div.innerHTML = marked.parse(text);;
            }

            const chat = document.getElementById("chat");
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;

            return div;
        }

        /* SEND MESSAGE */
        async function send() {

            const input = document.getElementById("input");
            const text = input.value.trim();

            if (!text) return;

            if (!userLocation) {
                addMessage("❌ Enable location first", "ai");
                return;
            }

            addMessage(text, "user");
            input.value = "";

            const typing = addMessage("", "ai");

            typing.innerHTML = `
            <div class="dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            `;
            try {
                const res = await fetch("http://127.0.0.1:8000/ask-stream", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        text,
                        session_id: sessionId,
                        mode,
                        lat: userLocation?.lat,
                        lon: userLocation?.lon
                    })
                });

                // const data = await res.json();
                let fullText = "";

                const reader = res.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    fullText += decoder.decode(value, { stream: true });

                    typing.innerHTML = marked.parse(fullText);
                }
                // typing.innerText = "";
                // typeText(data.answer, typing);

            } catch (err) {
                typing.innerText = "Server error";
            }
        }

        /* GEOLOCATION */
        function getLocation() {
            return new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(
                    pos => resolve({
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude
                    }),
                    reject
                );
            });
        }

        window.onload = async () => {
            try {
                userLocation = await getLocation();
                // 📍
                addMessage(" Location detected", "ai");
            } catch {
                addMessage("⚠️ Please allow location", "ai");
            }
        };

        function typeText(text, element, speed = 15) {
            let i = 0;
            element.innerText = "";

            function typing() {
                if (i < text.length) {
                    element.innerText += text.charAt(i);
                    i++;
                    setTimeout(typing, speed);
                }
            }

            typing();
        }

        function newChat() {

            // Create a brand new conversation
            sessionId = crypto.randomUUID();

            // Clear the chat window
            document.getElementById("chat").innerHTML = "";

            addMessage("🌱 New conversation started.", "ai");
        }
    </script>

</body>

</html>
