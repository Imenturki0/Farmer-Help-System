version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: farmer-ai-backend

    ports:
      - "8000:8000"

    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_URL: http://host.docker.internal:11434/api/generate
      MODEL_NAME: llama3:latest

    depends_on:
      - qdrant


  frontend:
    image: nginx:alpine

    container_name: farmer-ai-frontend

    volumes:
      - ./frontend:/usr/share/nginx/html

    ports:
      - "5500:80"


  qdrant:
    image: qdrant/qdrant

    container_name: farmer-ai-qdrant

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage


volumes:

  qdrant_data: